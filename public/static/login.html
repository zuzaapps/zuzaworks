<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZuZaWorksOS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    
    <div class="login-card max-w-md w-full rounded-2xl shadow-2xl p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-full mb-4">
                <i class="fas fa-briefcase text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">ZuZaWorksOS</h1>
            <p class="text-gray-600 mt-2">Workforce Management Platform</p>
        </div>

        <!-- Error Alert -->
        <div id="errorAlert" class="hidden mb-4 p-4 bg-red-100 border-l-4 border-red-500 text-red-700 rounded">
            <div class="flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorMessage"></span>
            </div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-envelope mr-2 text-purple-600"></i>Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    required
                    placeholder="you@zuzaworks.co.za"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600 focus:border-transparent transition"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2 text-purple-600"></i>Password
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="password" 
                        required
                        placeholder="••••••••"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600 focus:border-transparent transition"
                    >
                    <button 
                        type="button" 
                        onclick="togglePassword()"
                        class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
                    >
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <!-- Remember Me -->
            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" id="rememberMe" class="rounded text-purple-600 focus:ring-purple-500">
                    <span class="ml-2 text-sm text-gray-600">Remember me</span>
                </label>
                <a href="#" class="text-sm text-purple-600 hover:text-purple-700">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition transform hover:scale-105 shadow-lg"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>
                <span id="submitText">Sign In</span>
                <i class="fas fa-spinner fa-spin ml-2 hidden" id="loadingSpinner"></i>
            </button>
        </form>

        <!-- Divider -->
        <div class="my-6 flex items-center">
            <div class="flex-1 border-t border-gray-300"></div>
            <span class="px-4 text-sm text-gray-500">Demo Accounts</span>
            <div class="flex-1 border-t border-gray-300"></div>
        </div>

        <!-- Quick Login Buttons -->
        <div class="grid grid-cols-2 gap-3">
            <button 
                onclick="quickLogin('hilton@zuzaworks.co.za', 'SecurePass123!')"
                class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition"
            >
                <i class="fas fa-crown mr-1"></i> Executive
            </button>
            <button 
                onclick="quickLogin('manager@zuzaworks.co.za', 'Manager123!')"
                class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700 transition"
            >
                <i class="fas fa-user-tie mr-1"></i> Manager
            </button>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>Don't have an account? <a href="#" class="text-purple-600 hover:text-purple-700 font-semibold">Contact HR</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        const API_URL = window.location.origin;

        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Show error message
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.textContent = message;
            errorAlert.classList.remove('hidden');
            
            setTimeout(() => {
                errorAlert.classList.add('hidden');
            }, 5000);
        }

        // Quick login for demo
        function quickLogin(email, password) {
            document.getElementById('email').value = email;
            document.getElementById('password').value = password;
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitText = document.getElementById('submitText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            
            // Show loading state
            submitText.textContent = 'Signing in...';
            loadingSpinner.classList.remove('hidden');
            
            try {
                const response = await axios.post(`${API_URL}/api/auth/login`, {
                    email,
                    password
                });
                
                if (response.data.success) {
                    const { token, role, first_name, last_name } = response.data.data;
                    
                    // Store token and user info
                    localStorage.setItem('auth_token', token);
                    localStorage.setItem('user_role', role);
                    localStorage.setItem('user_name', `${first_name} ${last_name}`);
                    localStorage.setItem('user_email', email);
                    
                    // Show success and redirect
                    submitText.textContent = `Welcome, ${first_name}!`;
                    
                    setTimeout(() => {
                        // Redirect to dashboard based on role
                        if (role === 'executive' || role === 'manager') {
                            window.location.href = '/';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);
                } else {
                    showError(response.data.error || 'Login failed');
                    submitText.textContent = 'Sign In';
                    loadingSpinner.classList.add('hidden');
                }
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMsg = 'Login failed. Please check your credentials.';
                if (error.response && error.response.data) {
                    errorMsg = error.response.data.error || errorMsg;
                }
                
                showError(errorMsg);
                submitText.textContent = 'Sign In';
                loadingSpinner.classList.add('hidden');
            }
        });

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('auth_token');
            if (token) {
                // Verify token is still valid
                axios.get(`${API_URL}/api/auth/me`, {
                    headers: { Authorization: `Bearer ${token}` }
                })
                .then(() => {
                    window.location.href = '/';
                })
                .catch(() => {
                    // Token invalid, clear storage
                    localStorage.clear();
                });
            }
        });
    </script>
</body>
</html>
